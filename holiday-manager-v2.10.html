<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairLeave — Self-Managed Holiday System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<style>
:root{
  --bg:#EDF1EF; --surface:#FFFFFF; --ink:#1E2A26; --muted:#5D6C67;
  --pine:#175E54; --pine-deep:#0E3F38; --pine-soft:#DCEAE6;
  --amber:#C97E06; --amber-soft:#FBEED3;
  --red:#A63D2F; --red-soft:#F7E3DF;
  --line:#D7E0DC; --radius:14px;
  --font-display:'Bricolage Grotesque', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--ink); font-family:var(--font-body); font-size:15px; line-height:1.5;}
button{font-family:var(--font-body); cursor:pointer;}
input,select{font-family:var(--font-body); font-size:14px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink);}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--pine); outline-offset:1px;}
.wrap{max-width:1080px; margin:0 auto; padding:20px 16px 60px;}
header.top{display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between; margin-bottom:22px;}
.brand h1{font-family:var(--font-display); font-weight:800; font-size:26px; letter-spacing:-.02em; color:var(--pine-deep);}
.brand h1 .dot{color:var(--amber);}
.brand p{font-size:12.5px; color:var(--muted); margin-top:-2px;}
.who-bar{display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted);}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
.grid{display:grid; gap:16px;}
@media(min-width:860px){ .grid.two{grid-template-columns:1.5fr 1fr;} }
h2{font-family:var(--font-display); font-weight:700; font-size:18px; letter-spacing:-.01em; margin-bottom:10px;}
.sub{font-size:12.5px; color:var(--muted);}
.btn{border:none; border-radius:9px; padding:9px 16px; font-weight:600; font-size:13.5px;}
.btn.primary{background:var(--pine); color:#fff;}
.btn.primary:hover{background:var(--pine-deep);}
.btn.ghost{background:#fff; border:1px solid var(--line); color:var(--ink);}
.btn.ghost:hover{border-color:var(--pine);}
.btn.danger{background:var(--red-soft); color:var(--red);}
.btn.small{padding:5px 10px; font-size:12.5px;}
.btn:disabled{opacity:.45; cursor:not-allowed;}
.tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;}
.tabs button{border:1px solid var(--line); background:#fff; border-radius:9px; padding:7px 14px; font-size:13.5px; font-weight:600; color:var(--muted);}
.tabs button.on{background:var(--pine-soft); border-color:var(--pine); color:var(--pine-deep);}
.tabs button .badge{display:inline-block; min-width:18px; padding:0 5px; margin-left:5px; border-radius:999px; background:var(--amber); color:#fff; font-size:11px; line-height:18px;}
.cal-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
.cal-title{font-family:var(--font-display); font-weight:700; font-size:17px;}
.cal-nav{display:flex; gap:6px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
.cal-dow{font-size:11px; font-weight:700; color:var(--muted); text-align:center; text-transform:uppercase; letter-spacing:.06em; padding:4px 0;}
.cal-cell{min-height:74px; border:1px solid var(--line); border-radius:9px; padding:5px 6px; background:#fff; position:relative; font-size:12px;}
.cal-cell.pad{background:transparent; border-color:transparent;}
.cal-cell.rest{background:#F4F7F5;}
.cal-cell.blackout{background:repeating-linear-gradient(-45deg,#EFE2DE 0 6px,#F8EFEC 6px 12px); border-color:#E3C8C0;}
.cal-cell.today{outline:2px solid var(--pine); outline-offset:-2px;}
.cal-cell .d{font-weight:700;}
.cal-cell.blackout .d::after{content:"×"; color:var(--red); margin-left:4px; font-weight:800;}
.pips{display:flex; gap:3px; margin-top:3px;}
.pip{width:9px; height:9px; border-radius:999px; border:1.5px solid var(--pine); background:#fff;}
.pip.full{background:var(--pine);}
.pip.over{background:var(--red); border-color:var(--red);}
.who{display:flex; flex-wrap:wrap; gap:2px; margin-top:4px;}
.chip{background:var(--amber-soft); color:#7A4E04; border-radius:5px; padding:0 4px; font-size:10.5px; font-weight:700;}
.chip.me{background:var(--pine-soft); color:var(--pine-deep);}
.legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--muted); align-items:center;}
.legend span{display:inline-flex; align-items:center; gap:5px;}
.swatch{width:12px; height:12px; border-radius:4px; display:inline-block;}
.frow{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:10px;}
.frow label{display:flex; flex-direction:column; gap:4px; font-size:12px; font-weight:600; color:var(--muted);}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:8px 8px; border-bottom:1px solid var(--line);}
td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tag{display:inline-block; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:700;}
.tag.approved{background:var(--pine-soft); color:var(--pine-deep);}
.tag.pending{background:var(--amber-soft); color:#7A4E04;}
.tag.cancelled,.tag.declined,.tag.failed{background:#ECEEED; color:var(--muted);}
.tag.blackout{background:var(--red-soft); color:var(--red);}
.me-strip{display:flex; gap:16px; align-items:center; flex-wrap:wrap;}
.ring{position:relative; width:78px; height:78px; flex:none;}
.ring svg{transform:rotate(-90deg);}
.ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:var(--font-display);}
.ring .num b{font-size:20px; line-height:1;}
.ring .num small{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.notice{border-radius:10px; padding:12px 14px; font-size:13.5px; margin-top:10px;}
.notice.err{background:var(--red-soft); color:#6E2A1F;}
.notice.warn{background:var(--amber-soft); color:#6B4503;}
.conflict-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line);}
.conflict-item:last-child{border-bottom:none;}
#toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:10px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:99; max-width:88vw; text-align:center;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}
.empty{color:var(--muted); font-size:13.5px; padding:14px 4px; text-align:center;}
.mt{margin-top:16px;} .mb{margin-bottom:12px;}
.login-box{max-width:460px; margin:6vh auto 0;}
.login-box h2{margin-bottom:4px;}
.login-box .frow{margin-top:14px;}
.hr{border:none; border-top:1px solid var(--line); margin:16px 0;}
.spin{display:inline-block; width:14px; height:14px; border:2px solid #fff8; border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.modal-bg{position:fixed; inset:0; background:rgba(20,30,27,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}
.modal{background:#fff; border-radius:var(--radius); padding:20px; max-width:440px; width:100%;}
.linkbox{font-size:11.5px; background:#F4F7F5; border:1px solid var(--line); border-radius:7px; padding:4px 8px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block; vertical-align:middle;}
.qr-wrap{display:flex; justify-content:center; padding:14px; background:#fff; border-radius:10px; border:1px solid var(--line); margin:14px 0;}
.qr-steps{font-size:13px; color:var(--muted); line-height:1.7;}
.qr-steps b{color:var(--ink);}
.scan-wrap{position:relative; width:100%; max-width:340px; margin:14px auto; border-radius:12px; overflow:hidden; background:#000; aspect-ratio:1/1;}
.scan-wrap video{width:100%; height:100%; object-fit:cover; display:block;}
.scan-frame{position:absolute; inset:14%; border:3px solid #fff; border-radius:14px; box-shadow:0 0 0 999px rgba(0,0,0,.28); pointer-events:none;}
.scan-status{text-align:center; font-size:13px; color:var(--muted); min-height:18px; margin-top:4px;}
.link-divider{display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--muted); font-size:12px;}
.link-divider::before,.link-divider::after{content:''; flex:1; height:1px; background:var(--line);}
.print-sheet{background:#fff; padding:24px;}
.print-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
.print-head h2{font-family:var(--font-display); font-size:20px; color:var(--pine-deep);}
.print-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
.print-card{border:1px solid var(--line); border-radius:10px; padding:14px; text-align:center; break-inside:avoid;}
.print-card .pqr{display:flex; justify-content:center; margin-bottom:8px;}
.print-card .pname{font-weight:700; font-size:13.5px; color:var(--ink);}
.print-card .pteam{font-size:11.5px; color:var(--muted);}
@media print{
  body *{visibility:hidden;}
  .print-sheet-overlay,.print-sheet-overlay *{visibility:visible;}
  .modal-bg{position:static !important; background:none !important; padding:0 !important; display:block !important;}
  .modal{position:static !important; max-width:100% !important; width:100% !important; box-shadow:none !important; border:none !important; padding:0 !important;}
  .print-sheet-overlay{position:absolute; top:0; left:0; width:100%; padding:0 !important;}
  .print-head,.print-actions{display:none !important;}
  .print-grid{grid-template-columns:repeat(3,1fr);}
}
/* ---------- help chat bot ---------- */
.help-fab{position:fixed; right:18px; bottom:18px; width:52px; height:52px; border-radius:50%; background:var(--pine); color:#fff; border:none; font-size:22px; line-height:1; box-shadow:0 4px 14px rgba(14,63,56,.35); z-index:60;}
.help-fab:hover{background:var(--pine-deep);}
.help-panel{position:fixed; right:18px; bottom:80px; width:350px; max-width:calc(100vw - 24px); height:460px; max-height:72vh; background:#fff; border:1px solid var(--line); border-radius:14px; display:flex; flex-direction:column; overflow:hidden; z-index:60; box-shadow:0 10px 30px rgba(20,30,27,.25);}
.help-head{background:var(--pine); color:#fff; padding:10px 14px; font-family:var(--font-display); font-weight:700; font-size:14.5px; display:flex; justify-content:space-between; align-items:center;}
.help-head button{background:transparent; border:none; color:#fff; font-size:17px;}
.help-msgs{flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; font-size:13.5px;}
.hmsg{max-width:88%; padding:8px 11px; border-radius:11px; white-space:pre-wrap; line-height:1.45;}
.hmsg.user{align-self:flex-end; background:var(--pine-soft); color:var(--pine-deep);}
.hmsg.bot{align-self:flex-start; background:#F4F7F5; border:1px solid var(--line);}
.hmsg.think{align-self:flex-start; color:var(--muted); font-style:italic;}
.help-in{display:flex; gap:6px; padding:10px; border-top:1px solid var(--line);}
.help-in input{flex:1;}
.help-hints{display:flex; gap:5px; flex-wrap:wrap; padding:0 12px 10px;}
.help-hints button{border:1px solid var(--line); background:#fff; border-radius:999px; padding:4px 10px; font-size:11.5px; color:var(--muted);}
@media(prefers-reduced-motion:reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1 id="brandName">FairLeave<span class="dot">.</span></h1>
      <p>Self-managed holidays · first come, first served · true-exchange swaps</p>
    </div>
    <div class="who-bar" id="whoBar"></div>
  </header>
  <main id="app"></main>
</div>
<div id="toast" role="status"></div>

<button class="help-fab" id="helpFab" aria-label="Open help assistant" title="Help">?</button>
<div class="help-panel" id="helpPanel" style="display:none;" role="dialog" aria-label="Help assistant">
  <div class="help-head"><span>FairLeave assistant</span><button id="helpClose" aria-label="Close">×</button></div>
  <div class="help-msgs" id="helpMsgs"></div>
  <div class="help-hints" id="helpHints"></div>
  <div class="help-in">
    <input id="helpInput" placeholder="Ask anything about the system…" autocomplete="off">
    <button class="btn primary small" id="helpSend">Send</button>
  </div>
</div>

<script>
/* =========================================================
   FairLeave v2 — front-end for the Apps Script + Sheet backend
   All rules run server-side (race-safe). This client renders
   state, sends actions, and re-renders from server responses.
   ========================================================= */

const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbyt-o9li8OX7h3UPjWakQaVpJDk11MRC3DUFhDz8NlW8XZYYi4PGyRQeyJWRV0Ex95Wag/exec';

const S = {
  apiUrl:'', role:null, token:null, pin:null, me:null, data:null,
  ui:{ month: new Date().toISOString().slice(0,7)+'-01', mgmtTab:'overview', calTeam:null,
       conflict:null, swapModal:null, qrModal:null, printSheet:false, showApiField:false, scanOpen:false, busy:false }
};

/* ---------- safe local settings (works even where localStorage is blocked) ---------- */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return (store._m||{})[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ (store._m=store._m||{})[k]=v; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){ if(store._m) delete store._m[k]; } }
};

/* ---------- API ---------- */
async function api(action, payload){
  const body = Object.assign({action}, payload||{});
  if (S.token) body.token = S.token;
  if (S.pin) body.pin = S.pin;
  const res = await fetch(S.apiUrl, {method:'POST', body: JSON.stringify(body)});
  if (!res.ok) throw new Error('Server error ('+res.status+')');
  const out = await res.json();
  if (out.state) S.data = out.state;
  return out;
}
async function call(action, payload, okMsg){
  if (S.ui.busy) return null;
  S.ui.busy = true; render();
  try{
    const out = await api(action, payload);
    if (out.ok === false){
      if (out.error === 'Not authorised.' || out.error === 'Management PIN required.'){
        toast('Your session ended — please sign in again.', true);
        S.role=null; S.token=null; S.pin=null; S.me=null; S.data=null;
        S.ui.mgmtTab='overview'; S.ui.qrModal=null; S.ui.swapModal=null; S.ui.conflict=null;
        store.del('fl-token');
      } else {
        toast(out.error || 'Something went wrong.', true);
      }
      return out;
    }
    if (okMsg) toast(okMsg);
    return out;
  }catch(err){ toast('Connection problem: '+err.message, true); return null; }
  finally{ S.ui.busy = false; render(); }
}

/* ---------- date utils ---------- */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function pISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(Date.UTC(y,m-1,d)); }
function toISO(d){ return d.toISOString().slice(0,10); }
function addDays(s,n){ const d=pISO(s); d.setUTCDate(d.getUTCDate()+n); return toISO(d); }
function isNonWorking(s){ const wd=pISO(s).getUTCDay(); return S.data && S.data.workSaturday ? wd===0 : (wd===0||wd===6); }
function workdaysIn(s,e){ let n=0,c=s; while(c<=e){ if(!isNonWorking(c)) n++; c=addDays(c,1);} return n; }
function fmt(s){ return pISO(s).toLocaleDateString('en-IE',{day:'numeric',month:'short',timeZone:'UTC'}); }
function monthTitle(iso){ return pISO(iso).toLocaleDateString('en-IE',{month:'long',year:'numeric',timeZone:'UTC'}); }

/* ---------- lookups ---------- */
const emp = id => S.data.employees.find(e=>e.id===id);
const team = id => S.data.teams.find(t=>t.id===id);
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const approved = () => S.data.bookings.filter(b=>b.status==='approved');
function bookingsOnDay(teamId, day){
  return approved().filter(b=>{
    const e=emp(b.employeeId);
    if (!e) return false;
    if (teamId !== 'ALL' && e.teamId !== teamId) return false;
    return b.start<=day && day<=b.end;
  });
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg, isErr){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? 'var(--red)' : 'var(--ink)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 4500);
}

/* ---------- login screen ---------- */
function loginView(){
  return `<div class="card login-box">
    <h2>Sign in</h2>
    <p class="sub">Employees: scan your QR code, or open your personal link. Management: enter the PIN.</p>

    <button class="btn primary" data-act="scan-open" style="width:100%; padding:12px;">📷 Scan your QR code</button>

    <div class="link-divider">or</div>
    <div class="frow">
      <label style="flex:1;">Have a code instead? <input id="loginToken" placeholder="paste your access code"></label>
      <button class="btn ghost" data-act="login-emp">${S.ui.busy?'<span class="spin"></span>':''}Sign in</button>
    </div>

    <hr class="hr">
    <div class="frow">
      <label style="flex:1;">Management PIN <input id="loginPin" type="password" placeholder="••••"></label>
      <button class="btn ghost" data-act="login-mgmt">Management sign in</button>
    </div>
    <hr class="hr">
    <button class="btn ghost small" data-act="toggle-advanced">${S.ui.showApiField ? 'Hide advanced settings' : 'Advanced settings'}</button>
    ${S.ui.showApiField ? `
      <div class="frow mt">
        <label style="flex:1;">System address (API URL)
          <input id="apiUrl" placeholder="https://script.google.com/macros/s/…/exec" value="${S.apiUrl||''}">
        </label>
        <button class="btn ghost small" data-act="save-api">Save</button>
      </div>
      <p class="sub">Only change this if you've been told to connect to a different FairLeave deployment.</p>
    ` : ''}
  </div>
  ${S.ui.scanOpen ? scanModalHTML() : ''}`;
}

function scanModalHTML(){
  return `<div class="modal-bg" data-act="scan-close-bg">
    <div class="modal">
      <h2>Scan your QR code</h2>
      <p class="sub">Ask your manager to show it if you don't have it saved — point your camera steadily at the code.</p>
      <div class="scan-wrap"><video id="scanVideo" playsinline muted></video><div class="scan-frame"></div></div>
      <div class="scan-status" id="scanStatus">Starting camera…</div>
      <div class="frow" style="justify-content:flex-end; margin-top:8px;">
        <button class="btn ghost small" data-act="scan-close">Cancel</button>
      </div>
    </div>
  </div>`;
}

/* ---------- calendar ---------- */
function calendarHTML(teamId, highlightEmpId){
  const first = S.ui.month;
  const d0 = pISO(first);
  const year = d0.getUTCFullYear(), mon = d0.getUTCMonth();
  const daysInMonth = new Date(Date.UTC(year, mon+1, 0)).getUTCDate();
  const startDow = (d0.getUTCDay()+6)%7;
  const isAll = teamId === 'ALL';
  const t = isAll ? { id:'ALL', name:'All Teams', max:null } : team(teamId);
  const today = todayISO();
  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell pad"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const iso = `${year}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const rest = isNonWorking(iso);
    const bo = S.data.blackouts.find(b=>b.start<=iso && iso<=b.end);
    const off = rest ? [] : bookingsOnDay(teamId, iso);
    const cls = ['cal-cell', rest?'rest':'', bo?'blackout':'', iso===today?'today':''].join(' ');
    let pips = '';
    if(!rest && !bo){
      if (isAll){
        if (off.length) pips = `<span class="sub" style="font-weight:700; color:var(--pine-deep);">${off.length} off</span>`;
      } else {
        for(let p=0;p<t.max;p++){
          const c = p < off.length ? (off.length>t.max?'over':'full') : '';
          pips += `<span class="pip ${c}"></span>`;
        }
      }
    }
    const who = off.map(b=>{
      const e = emp(b.employeeId);
      const label = isAll ? `${e.name} · ${(team(e.teamId)||{}).name||''}` : e.name;
      const shortLabel = isAll ? `${initials(e.name)}·${((team(e.teamId)||{}).name||'?')[0]}` : initials(e.name);
      return `<span class="chip ${b.employeeId===highlightEmpId?'me':''}" title="${label}">${shortLabel}</span>`;
    }).join('');
    cells += `<div class="${cls}" title="${bo?bo.reason:''}"><span class="d">${day}</span><div class="pips">${pips}</div><div class="who">${who}</div></div>`;
  }
  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  return `
  <div class="cal-head">
    <div class="cal-title">${monthTitle(first)} · ${t.name} ${isAll ? '' : `<span class="sub">(max ${t.max} off/day)</span>`}</div>
    <div class="cal-nav">

/* ---------- employee view ---------- */
function employeeView(){

  const inbox = S.data.swaps.filter(w=>{

  const outbox = S.data.swaps.filter(w=>w.requesterId===me.id).sort((a,b)=>b.createdAt-a.createdAt).slice(0,6);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const showAddBanner = !isStandalone && store.get('fl-hide-a2hs') !== '1';

  return `

    <span><b>Tip:</b> add FairLeave to your home screen for one-tap access next time — iPhone: Share → Add to Home Screen. Android: menu (⋮) → Add to Home screen.</span>
    <button class="btn ghost small" data-act="dismiss-a2hs">Got it</button>
  </div>` : ''}
  <div class="grid two">
    <section class="card">${calendarHTML(t.id, me.id)}</section>
    <div style="display:flex; flex-direction:column; gap:16px;">
      <section class="card">

          <div class="ring" aria-label="${left} of ${me.entitlement} days left">
            <svg width="78" height="78" viewBox="0 0 78 78">
              <circle cx="39" cy="39" r="30" fill="none" stroke="var(--line)" stroke-width="9"/>
              <circle cx="39" cy="39" r="30" fill="none" stroke="var(--pine)" stroke-width="9"
                stroke-dasharray="${(C*pct).toFixed(1)} ${C.toFixed(1)}" stroke-linecap="round"/>
            </svg>
            <div class="num"><b>${left}</b><small>days left</small></div>
          </div>
          <div>
            <h2 style="margin-bottom:2px;">${me.name}</h2>
            <div class="sub">${t.name} · ${me.used} of ${me.entitlement} days used · ${S.data.workSaturday?'Sundays':'weekends'} don't count</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Request holidays</h2>

        </div>
        ${S.ui.conflict ? conflictPanel(S.ui.conflict) : ''}
      </section>

      ${inbox.length ? `<section class="card">
        <h2>Swap requests for you <span class="tag pending">${inbox.length}</span></h2>
        ${inbox.map(w=>{
          const tb = S.data.bookings.find(b=>b.id===w.targetBookingId);
          return `<div class="conflict-item">
            <div><b>${emp(w.requesterId).name}</b> wants to exchange: they take your <b>${fmt(tb.start)} – ${fmt(tb.end)}</b>, you pick new dates.</div>
            <div style="display:flex; gap:6px; flex:none;">
              <button class="btn primary small" data-act="swap-open" data-id="${w.id}">Exchange…</button>

        <h2>My bookings</h2>

/* ---------- render ---------- */
function render(){
  const who = document.getElementById('whoBar');
  if (S.role === 'employee') who.innerHTML = `Signed in as <b>${S.me.name}</b> <button class="btn ghost small" data-act="logout">Sign out</button>`;
  else if (S.role === 'mgmt') who.innerHTML = `<b>Management</b> <button class="btn ghost small" data-act="refresh">Refresh</button> <button class="btn ghost small" data-act="logout">Sign out</button>`;
  else who.innerHTML = '';
  if (S.data && S.data.company) document.getElementById('brandName').innerHTML = `${S.data.company}<span class="dot">.</span>`;
  const app = document.getElementById('app');
  if (!S.role) app.innerHTML = loginView();
  else if (S.role === 'employee') app.innerHTML = employeeView();
  else app.innerHTML = mgmtView();
  if (S.ui.qrModal) renderQR();
  if (S.ui.printSheet) renderPrintSheet();
  if (!S.role && S.ui.scanOpen) scanStart();
}

/* ---------- events ---------- */
document.addEventListener('click', async (ev)=>{
  const btn = ev.target.closest('[data-act]');
  if(!btn) return;
  const act = btn.dataset.act, id = btn.dataset.id;
  const val = sel => { const el=document.getElementById(sel); return el?el.value:''; };
  const fieldVal = (f,i) => { const el=document.querySelector(`[data-field="${f}"][data-id="${i}"]`); return el?el.value:''; };

  if(act==='toggle-advanced'){ S.ui.showApiField = !S.ui.showApiField; render(); return; }
  if(act==='scan-open'){ S.ui.scanOpen = true; render(); return; }
  if(act==='scan-close' || (act==='scan-close-bg' && ev.target===btn)){
    scanStop(); S.ui.scanOpen = false; render(); return;
  }
  if(act==='save-api'){
    const u = val('apiUrl').trim();
    if(!u){ toast('Enter a system address.', true); return; }
    S.apiUrl = u; store.set('fl-api', S.apiUrl);
    toast('System address updated.');
    return;
  }
  if(act==='login-emp' || act==='login-mgmt'){
    if(!S.apiUrl){ toast('System address not set — open Advanced settings.', true); return; }
    S.token = act==='login-emp' ? val('loginToken').trim() : null;
    S.pin   = act==='login-mgmt' ? val('loginPin').trim() : null;
    const out = await call('login');
    if(out && out.ok){
      S.role = out.role; S.me = out.me || null;
      if (S.token) store.set('fl-token', S.token);
      render();
    }
    return;
  }
  if(act==='logout'){
    S.role=null; S.token=null; S.pin=null; S.me=null; S.data=null; S.ui.conflict=null; S.ui.swapModal=null;
    store.del('fl-token'); history.replaceState(null,'',location.pathname+location.search); render(); return;
  }
  if(act==='refresh'){ await call('state'); return; }

  if(act==='cal-prev'||act==='cal-next'){
    const d=pISO(S.ui.month); d.setUTCMonth(d.getUTCMonth()+(act==='cal-next'?1:-1),1); S.ui.month=toISO(d); render(); return;
  }
  if(act==='cal-today'){ S.ui.month=todayISO().slice(0,7)+'-01'; render(); return; }
  if(act==='mtab'){ S.ui.mgmtTab=id; render(); call('state'); return; }

  if(act==='request'){
    const s=val('reqStart'), e=val('reqEnd');
    const out = await call('requestHoliday',{start:s,end:e});
    if(out && out.ok){
      if(out.approved){ S.ui.conflict=null; toast(`Approved automatically — ${fmt(s)} to ${fmt(e)} (${out.days} days).`); }
      else S.ui.conflict = {s,e,reason:out.reason,conflicts:out.conflicts};
      render();
    }
    return;
  }
  if(act==='ask-swap'){
    const pc=S.ui.conflict; if(!pc) return;
    const out = await call('requestSwap',{targetBookingId:id, reqStart:pc.s, reqEnd:pc.e},'Exchange request sent.');
    if(out && out.ok){ S.ui.conflict=null; render(); }
    return;
  }
  if(act==='dismiss-conflict'){ S.ui.conflict=null; render(); return; }
  if(act==='swap-open'){ S.ui.swapModal=id; render(); return; }
  if(act==='swap-close' || (act==='swap-close-bg' && ev.target===btn)){ S.ui.swapModal=null; render(); return; }
  if(act==='swap-decline'){ await call('respondSwap',{swapId:id,accept:false},'Swap declined.'); S.ui.swapModal=null; return; }
  if(act==='swap-release'){
    const out = await call('respondSwap',{swapId:id,accept:true,releaseOnly:true},'Released — their holidays are booked.');
    if(out && out.ok) S.ui.swapModal=null; render(); return;
  }
  if(act==='swap-exchange'){
    const ns=val('swapNewStart'), ne=val('swapNewEnd');
    const out = await call('respondSwap',{swapId:id,accept:true,newStart:ns,newEnd:ne},'Exchange complete — both bookings updated.');
    if(out && out.ok) S.ui.swapModal=null; render(); return;
  }
  if(act==='cancel'){ await call('cancelBooking',{bookingId:id},'Booking cancelled — those dates are open again.'); return; }

  /* management */
  if(act==='team-add'){ const n=val('newTeamName').trim(); if(!n){toast('Give the team a name.',true);return;}
    await call('addTeam',{name:n,max:parseInt(val('newTeamMax'))||1},'Team added.'); return; }
  if(act==='team-save'){ await call('updateTeam',{id, name:fieldVal('tname',id), max:parseInt(fieldVal('tmax',id))||1},'Team saved.'); return; }
  if(act==='team-del'){ await call('deleteTeam',{id},'Team deleted.'); return; }
  if(act==='emp-add'){ const n=val('newEmpName').trim(); if(!n){toast('Enter a name.',true);return;}
    await call('addEmployee',{name:n,teamId:val('newEmpTeam'),entitlement:parseInt(val('newEmpEnt'))||0,email:val('newEmpEmail').trim()},'Person added — copy their sign-in link.'); return; }
  if(act==='emp-save'){ await call('updateEmployee',{id, name:fieldVal('ename',id), teamId:fieldVal('eteam',id),
    entitlement:parseInt(fieldVal('eent',id))||0, email:fieldVal('eemail',id).trim()},'Saved.'); return; }
  if(act==='emp-retoken'){ await call('regenToken',{id},'New sign-in link generated — the old one no longer works.'); return; }
  if(act==='emp-del'){ await call('deleteEmployee',{id},'Removed — their future bookings were cancelled.'); return; }
  if(act==='bo-add'){ await call('addBlackout',{start:val('boStart'),end:val('boEnd'),reason:val('boReason').trim()},'Blackout added.'); return; }
  if(act==='bo-del'){ await call('deleteBlackout',{id},'Blackout removed.'); return; }
  if(act==='sync-sched'){
    const out = await call('syncScheduler');
    if(out && out.ok) toast(out.summary || 'Sync complete.');
    return;
  }
  if(act==='import-leave'){
    const out = await call('importLeave');
    if(out && out.ok) toast(out.summary || 'Import complete.');
    return;
  }
  if(act==='copy-link'){
    const link = location.href.split('#')[0]+'#t='+id;
    try{ await navigator.clipboard.writeText(link); toast('Sign-in link copied.'); }
    catch(e){ prompt('Copy this link:', link); }
    return;
  }
  if(act==='qr-open'){ S.ui.qrModal=id; render(); return; }
  if(act==='qr-close' || (act==='qr-close-bg' && ev.target===btn)){ S.ui.qrModal=null; render(); return; }
  if(act==='print-open'){ S.ui.printSheet=true; render(); return; }
  if(act==='print-close' || (act==='print-close-bg' && ev.target===btn)){ S.ui.printSheet=false; render(); return; }
  if(act==='print-now'){ window.print(); return; }
  if(act==='dismiss-a2hs'){ store.set('fl-hide-a2hs','1'); render(); return; }
});

document.addEventListener('change', (ev)=>{

});

/* =========================================================
   Help chat bot — Claude via Cloudflare Worker proxy.
   Role-aware: setup guide (signed out), employee help,
   management help. Static fallback if the Worker is down.
   ========================================================= */
const HELP_PROXY_URL = 'https://quantumbuild-ai-proxy.aged-wave-0b52.workers.dev/anthropic';
const HELP_MODEL = 'claude-haiku-4-5-20251001';
const HELP_MAX_TURNS = 12;

const KB_RULES = `RULES ENGINE (how FairLeave decides):
1. Holidays are self-managed: no manager approval step. First come, first served.
2. A request is APPROVED INSTANTLY if: no blackout overlaps it, the employee has enough entitlement days left, and on every working day of the range the team is under its "max off at once" limit.
3. Blackout periods are set by management and are company-wide: nobody can book holidays inside them.
4. Working week is Monday–Saturday by default (Sunday is the only non-working day). Non-working days don't use entitlement or a team slot. Public holidays are handled by management adding a blackout.
5. If requested dates are FULL, the app shows who holds them and offers a swap ("exchange") request.
6. Swaps are TRUE EXCHANGES: the person holding the dates accepts by picking their own replacement dates. Both moves are validated together and booked together, or nothing changes. They can also "release without rebooking", or decline.
7. Employees can cancel their own future bookings; the freed dates become available to everyone.
8. Every change is written to an audit log.`;

const KB_EMPLOYEE = `EMPLOYEE HOW-TO:
- Sign in: on the sign-in screen, tap "Scan your QR code" and point your camera at the code (ask your manager to show it if you don't have it saved) — no typing needed. Or open your personal link if you have it. Keep your QR/link private — it's your key.
- Signed out or on a new device? Just tap "Scan your QR code" again — you never need to remember or type a code.
- Book: pick From/To dates, press Request. Green toast = approved, done. Your "days left" ring updates.
- Dates full? You'll see who holds them — press "Request exchange". They get notified (email if on file) and choose to exchange, release, or decline. Watch "My swap requests" for the outcome.
- Someone asked YOU to exchange: "Swap requests for you" appears. Press "Exchange…", pick your new dates (checked instantly), or "Release without rebooking", or Decline.
- Cancel: "Cancel" next to any future booking in My bookings.
- Calendar dots: filled dot = slot taken that day, empty = free. Hatched = blackout (no holidays). Grey = non-working day.`;

const KB_MGMT = `MANAGEMENT HOW-TO:
- Teams tab: create teams and set "max off at once" (the concurrency limit per working day). Save after editing.
- People tab: add people with entitlement (days/year) and optional email (needed for swap notification emails). Copy each person's private sign-in link and send it to them. "New link" invalidates the old one. Removing a person cancels their future bookings.
- Blackouts tab: add date ranges where NOBODY can book (Christmas rush, stocktake, public holidays). Existing bookings inside a new blackout are kept — cancel them from All bookings if needed.
- All bookings: oversight of everything; management can cancel any approved booking.
- Swaps tab: read-only oversight of exchanges. Full audit trail lives in the Google Sheet's Audit tab.
- Config (in the Google Sheet, not the app): MGMT_PIN (change from 1234!), COMPANY_NAME, WORK_SATURDAY (TRUE = Mon–Sat working week, FALSE = Mon–Fri), SCHEDULER_SHEET_ID (the Shift Scheduler spreadsheet to integrate with).
- Shift Scheduler integration: the scheduler owns people & departments — press "Sync people & departments" on the People tab to pull them in (departments become teams; check new teams' max-off limits, they default to 1). Every approved/exchanged/cancelled holiday is pushed automatically into the scheduler's LeaveRequests tab as Approved, tagged FairLeave:<id>, so the auto-scheduler never rosters someone on leave. "Import existing approved leave" is a one-time pull of leave already in the scheduler. Run diagnoseScheduler() in the Apps Script editor to verify the connection.`;

const KB_SETUP = `DEPLOYMENT GUIDE (one-time, ~10 min):
1. Create a Google Sheet (e.g. "FairLeave — <Client>").
2. Extensions → Apps Script → delete the stub → paste Code.gs → save.
3. Run setup() from the editor and authorise. Optionally run seedDemo() for sample data.
4. In the Sheet's Config tab: change MGMT_PIN from 1234, set COMPANY_NAME, set WORK_SATURDAY (TRUE = Mon–Sat).
5. Deploy → New deployment → Web app → Execute as: Me → Who has access: Anyone → Deploy.
6. Copy the /exec URL and set it as DEFAULT_API_URL near the top of the HTML file's script (search for "DEFAULT_API_URL") — this bakes the address in so nobody, employee or manager, ever needs to type it.
7. Host the HTML anywhere (GitHub Pages works). Sign in with the management PIN — no system address entry needed, it's built in.
8. Add teams & people, then send each person their QR code or private sign-in link from the People tab.
Code changes later: Deploy → Manage deployments → pencil → Version: New version → Deploy (URL stays the same, no HTML change needed).
Notes: tokens are 16-char random; PIN lives only in the Sheet; MailApp email quota ~100/day consumer, 1,500/day Workspace. The "Advanced settings" toggle on the sign-in screen only needs touching if switching an already-hosted copy to a different backend deployment.`;

let helpHistory = [];
let helpBusy = false;

function helpContext(){
  if (S.role === 'employee'){
    const me = emp(S.me.id) || S.me;
    const t = team(me.teamId) || {};
    return {label:'employee',
      system: `You are the built-in help assistant inside FairLeave, a self-managed holiday system. Answer briefly (2-5 sentences), plainly, and only about using this system. Never invent features. If asked about other employees' bookings or personal data, direct them to the calendar view. If something needs management (blackouts, entitlement changes, new sign-in link), say so.\n\n${KB_RULES}\n\n${KB_EMPLOYEE}\n\nTHIS USER: ${me.name}, team "${t.name}" (max ${t.max} off at once), ${me.entitlement - me.used} of ${me.entitlement} days left. Today is ${todayISO()}.`,
      hints:['How do I book holidays?','My dates are full — what now?','How do exchanges work?','How many days have I left?']};
  }
  if (S.role === 'mgmt'){
    return {label:'management',
      system: `You are the built-in help assistant inside FairLeave, a self-managed holiday system, talking to a manager/administrator. Answer briefly and practically, only about this system. Never invent features.\n\n${KB_RULES}\n\n${KB_MGMT}\n\n${KB_SETUP}\n\nToday is ${todayISO()}.`,
      hints:['How do team limits work?','Block Christmas week for everyone','Someone lost their sign-in link','How do I redeploy after changes?']};
  }
  return {label:'setup',
    system: `You are the built-in help assistant for FairLeave, a self-managed holiday system (Google Apps Script + Sheet backend, single HTML front-end). The user is not signed in — they are likely setting the system up or trying to sign in. Answer briefly and practically. Never invent features.\n\n${KB_SETUP}\n\n${KB_RULES}\n\nSign-in: employees use their personal link or paste their access code; management uses the PIN from the Sheet's Config tab. Both need the web app /exec URL in "System address".`,
    hints:['Walk me through setup','Where do I get the API URL?','I can\'t sign in','What does this system do?']};
}

function helpEsc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function helpRender(){
  const box = document.getElementById('helpMsgs');
  box.innerHTML = helpHistory.map(m=>`<div class="hmsg ${m.role==='user'?'user':'bot'}">${helpEsc(m.content)}</div>`).join('')
    + (helpBusy ? `<div class="hmsg think">thinking…</div>` : '');
  box.scrollTop = box.scrollHeight;
  const ctx = helpContext();
  document.getElementById('helpHints').innerHTML = helpHistory.length ? '' :
    ctx.hints.map(h=>`<button data-hint="${helpEsc(h)}">${helpEsc(h)}</button>`).join('');
}

function helpFallback(){
  const ctx = helpContext();
  const text = ctx.label==='setup' ? KB_SETUP : ctx.label==='mgmt' || ctx.label==='management' ? (KB_MGMT+'\n\n'+KB_RULES) : (KB_EMPLOYEE+'\n\n'+KB_RULES);
  return 'I can\'t reach the assistant service right now, so here\'s the built-in guide:\n\n'+text;
}

async function helpAsk(q){
  if (helpBusy || !q.trim()) return;
  helpHistory.push({role:'user', content:q.trim()});
  if (helpHistory.length > HELP_MAX_TURNS) helpHistory = helpHistory.slice(-HELP_MAX_TURNS);
  helpBusy = true; helpRender();
  try{
    const res = await fetch(HELP_PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: HELP_MODEL,
        max_tokens: 500,
        system: helpContext().system,
        messages: helpHistory.map(m=>({role:m.role, content:m.content}))
      })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
    if (!text) throw new Error('Empty response');
    helpHistory.push({role:'assistant', content:text});
  }catch(err){
    helpHistory.push({role:'assistant', content: helpFallback()});
  }finally{
    helpBusy = false; helpRender();
  }
}

document.getElementById('helpFab').addEventListener('click', ()=>{
  const p = document.getElementById('helpPanel');
  const open = p.style.display !== 'none';
  p.style.display = open ? 'none' : 'flex';
  if (!open){
    if (!helpHistory.length){
      const ctx = helpContext();
      const greet = ctx.label==='setup'
        ? 'Hi! I can walk you through setting up FairLeave, or help you sign in. What do you need?'
        : ctx.label==='employee'
          ? `Hi ${S.me.name.split(' ')[0]}! Ask me anything — booking holidays, exchanges, your days left.`
          : 'Hi! Ask me anything about running FairLeave — teams, limits, blackouts, sign-in links, deployment.';
      helpHistory.push({role:'assistant', content:greet});
    }
    helpRender();
    document.getElementById('helpInput').focus();
  }
});
document.getElementById('helpClose').addEventListener('click', ()=>{ document.getElementById('helpPanel').style.display='none'; });
document.getElementById('helpSend').addEventListener('click', ()=>{
  const el = document.getElementById('helpInput'); const q = el.value; el.value=''; helpAsk(q);
});
document.getElementById('helpInput').addEventListener('keydown', (e)=>{
  if (e.key==='Enter'){ const el=e.target; const q=el.value; el.value=''; helpAsk(q); }
});
document.getElementById('helpHints').addEventListener('click', (e)=>{
  const b = e.target.closest('[data-hint]'); if (b) helpAsk(b.dataset.hint);
});

/* ---------- QR camera scanner ---------- */
let scanStream = null, scanRAF = null;

async function scanStart(){
  const status = () => document.getElementById('scanStatus');
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(err){
    if (status()) status().textContent = 'Camera unavailable — check permissions, or use a code instead.';
    return;
  }
  const video = document.getElementById('scanVideo');
  if (!video){ scanStop(); return; }
  video.srcObject = scanStream;
  await video.play().catch(()=>{});
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  if (status()) status().textContent = 'Point your camera at the code…';

  const tick = () => {
    if (!S.ui.scanOpen) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = (typeof jsQR !== 'undefined') ? jsQR(img.data, img.width, img.height) : null;
      if (code && code.data){
        const m = code.data.match(/#t=([A-Za-z0-9]+)/);
        const tok = m ? m[1] : (/^[A-Za-z0-9]{10,24}$/.test(code.data.trim()) ? code.data.trim() : null);
        if (tok){ scanFound(tok); return; }
        if (status()) status().textContent = "That code isn't a FairLeave sign-in — try again.";
      }
    }
    scanRAF = requestAnimationFrame(tick);
  };
  scanRAF = requestAnimationFrame(tick);
}

function scanStop(){
  if (scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if (scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

async function scanFound(token){
  const status = document.getElementById('scanStatus');
  if (status) status.textContent = 'Code recognised — signing in…';
  scanStop();
  S.ui.scanOpen = false;
  S.token = token; S.pin = null;
  const out = await call('login');
  if (out && out.ok){
    S.role = out.role; S.me = out.me || null;
    store.set('fl-token', S.token);
    toast('Signed in.');
    render();
  } else {
    S.ui.scanOpen = true;
    render();
    setTimeout(()=>{ const s=document.getElementById('scanStatus'); if(s) s.textContent="That code didn't work — try again."; scanStart(); }, 50);
  }
}

/* ---------- boot ---------- */
(async ()=>{
  S.apiUrl = store.get('fl-api') || DEFAULT_API_URL;
  const m = location.hash.match(/#t=([A-Za-z0-9]+)/);
  const savedToken = m ? m[1] : store.get('fl-token');
  if (S.apiUrl && savedToken){
    S.token = savedToken;
    const out = await call('login');
    if (out && out.ok){ S.role=out.role; S.me=out.me; store.set('fl-token', S.token); }
    else { S.token=null; }
  }
  render();
})();
